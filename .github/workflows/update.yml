name: Daily Trending Update

on:
  # 每天 12:00 (GMT+8 = 4:00 UTC) 自动运行
  schedule:
    - cron: '0 4 * * *'
  # 支持手动触发
  workflow_dispatch:

# 允许写入仓库
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run update script
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/update.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-trending-bot"
          git config --global user.email "github-trending-bot@users.noreply.github.com"
          git add .
          if ! git diff --quiet || ! git diff --cached --quiet; then
            git commit -m "📊 每日更新 $(date +'%Y-%m-%d' --date='TZ=\"Asia/Shanghai\"')"
            git push
          else
            echo "ℹ️  没有变更，跳过提交"
          fi
